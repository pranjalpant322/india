<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew & Bite Cafe - Ordering System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        .hidden { display: none; }
        .card { background: white; border-radius: 1rem; transition: 0.2s; cursor: pointer; border: 1px solid transparent; }
        .card:hover { border-color: #F8B400; transform: translateY(-2px); }
        .btn-primary { background-color: #F8B400; color: black; font-weight: bold; transition: 0.2s; }
        .btn-primary:hover { background-color: #e2a300; }
    </style>
</head>
<body>

    <div id="auth-overlay" class="fixed inset-0 bg-black bg-opacity-80 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl max-w-sm w-full text-center">
            <h2 class="text-2xl font-bold mb-2">Welcome to ☕</h2>
            <p class="text-gray-500 mb-6 text-sm">Please enter your details to start ordering.</p>
            <input type="text" id="cust-name" placeholder="Your Name" class="w-full p-3 border rounded-xl mb-3 outline-none focus:ring-2 ring-orange-400">
            <input type="number" id="table-num" placeholder="Table Number" class="w-full p-3 border rounded-xl mb-6 outline-none focus:ring-2 ring-orange-400">
            <button onclick="startSession()" class="w-full btn-primary py-3 rounded-xl">Start Ordering</button>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[110] hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl max-w-xs w-full">
            <h3 class="font-bold text-center mb-4">Enter Staff PIN</h3>
            <input type="password" id="staff-pin" placeholder="••••" class="w-full text-center text-2xl tracking-widest p-3 border rounded-xl mb-4">
            <div class="flex gap-2">
                <button onclick="closePinModal()" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button>
                <button onclick="verifyPin()" class="flex-1 btn-primary py-2 rounded-lg">Unlock</button>
            </div>
            <p id="pin-error" class="text-red-500 text-xs mt-2 text-center hidden">Incorrect PIN!</p>
        </div>
    </div>

    <header class="bg-[#1A1A1A] text-[#F8B400] p-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
        <div class="flex items-center gap-2">
            <span class="text-2xl">☕</span>
            <h1 class="font-bold tracking-tight">BREW & BITE CAFE</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="display-user" class="text-white text-xs hidden md:block"></span>
            <button onclick="openPinModal()" id="portal-btn" class="bg-[#2D2D2D] text-white px-4 py-1.5 rounded-lg text-xs border border-stone-700">STAFF PORTAL</button>
        </div>
    </header>

    <main id="customer-view" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="md:col-span-2">
            <h2 class="text-3xl font-bold mb-8">🍴 Menu</h2>
            <div id="menu-container">
                </div>
        </div>

        <div class="md:col-span-1">
            <div class="bg-white rounded-2xl shadow-xl sticky top-24 overflow-hidden">
                <div class="bg-black text-white p-4 flex justify-between items-center">
                    <span class="font-bold text-xs tracking-widest uppercase">Your Order</span>
                    <span id="cart-count" class="bg-orange-400 text-black px-2 py-0.5 rounded-full text-xs font-bold">0</span>
                </div>
                <div id="cart-items" class="p-4 min-h-[100px] max-h-80 overflow-y-auto text-gray-500 text-center py-10">
                    Hungry? Add something!
                </div>
                <div id="cart-footer" class="p-4 border-t hidden">
                    <div class="flex justify-between font-bold text-lg mb-4"><span>Total:</span><span id="cart-total">₹0</span></div>
                    <button onclick="placeOrder()" class="w-full btn-primary py-3 rounded-xl shadow-lg shadow-orange-200">Place Order</button>
                </div>
            </div>
        </div>
    </main>

    <main id="staff-view" class="max-w-4xl mx-auto p-6 hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold">📋 Active Orders</h2>
            <button onclick="exitStaff()" class="text-red-500 font-bold text-sm">Exit Panel</button>
        </div>
        <div id="orders-list" class="space-y-4">
            <p class="text-gray-400">No active orders yet.</p>
        </div>
    </main>

    <script>
        let cart = [];
        let allOrders = [];
        const menu = [
            { id: 1, name: 'Espresso', price: 120, cat: 'Beverages', desc: 'Strong classic coffee.' },
            { id: 2, name: 'Cappuccino', price: 180, cat: 'Beverages', desc: 'Steamed milk & thick foam.' },
            { id: 3, name: 'Grilled Cheese', price: 250, cat: 'Food', desc: 'Melted cheddar on sourdough.' }
        ];

        // Init Menu
        const menuContainer = document.getElementById('menu-container');
        let currentCat = '';
        menu.forEach(item => {
            if(item.cat !== currentCat) {
                currentCat = item.cat;
                menuContainer.innerHTML += `<h3 class="text-orange-500 font-bold uppercase mt-6 mb-4 border-l-4 border-orange-500 pl-3">${currentCat}</h3>`;
            }
            menuContainer.innerHTML += `
                <div onclick="addToCart(${item.id})" class="card p-5 flex justify-between items-center mb-3">
                    <div><h4 class="font-bold">${item.name}</h4><p class="text-xs text-gray-400">${item.desc}</p></div>
                    <span class="font-bold">₹${item.price}</span>
                </div>
            `;
        });

        function startSession() {
            const name = document.getElementById('cust-name').value;
            const table = document.getElementById('table-num').value;
            if(!name || !table) return alert("Details bharo bhai!");
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('display-user').innerText = `Table ${table} | ${name}`;
            document.getElementById('display-user').classList.remove('hidden');
        }

        function addToCart(id) {
            const item = menu.find(m => m.id === id);
            cart.push(item);
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const footer = document.getElementById('cart-footer');
            document.getElementById('cart-count').innerText = cart.length;
            if(cart.length === 0) {
                container.innerHTML = "Hungry? Add something!";
                footer.classList.add('hidden');
                return;
            }
            footer.classList.remove('hidden');
            container.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `<div class="flex justify-between text-sm mb-2 font-medium"><span>${item.name}</span><span>₹${item.price}</span></div>`;
            });
            document.getElementById('cart-total').innerText = '₹' + total;
        }

        function placeOrder() {
            const name = document.getElementById('cust-name').value;
            const table = document.getElementById('table-num').value;
            const order = { name, table, items: [...cart], time: new Date().toLocaleTimeString() };
            allOrders.push(order);
            alert("Order Placed! Rasoi mein kaam shuru ho gaya hai.");
            cart = [];
            renderCart();
            updateStaffPanel();
        }

        // Staff Logic
        function openPinModal() { document.getElementById('pin-modal').classList.remove('hidden'); }
        function closePinModal() { document.getElementById('pin-modal').classList.add('hidden'); }
        function verifyPin() {
            if(document.getElementById('staff-pin').value === '1234') {
                document.getElementById('customer-view').classList.add('hidden');
                document.getElementById('staff-view').classList.remove('hidden');
                closePinModal();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
            }
        }
        function exitStaff() {
            document.getElementById('staff-view').classList.add('hidden');
            document.getElementById('customer-view').classList.remove('hidden');
        }
        function updateStaffPanel() {
            const list = document.getElementById('orders-list');
            if(allOrders.length === 0) return;
            list.innerHTML = '';
            allOrders.forEach(order => {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border-l-8 border-orange-400 shadow-sm">
                        <div class="flex justify-between border-bottom pb-2 mb-2 border-dashed border-gray-200">
                            <span class="font-bold">Table ${order.table} - ${order.name}</span>
                            <span class="text-xs text-gray-400">${order.time}</span>
                        </div>
                        <div class="text-sm text-gray-600">${order.items.map(i => i.name).join(', ')}</div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
